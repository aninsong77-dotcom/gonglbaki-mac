name: Mac 빌드

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Python 의존성 설치
        run: |
          pip install pyinstaller
          pip install -r server/requirements-mac.txt

      - name: Python 서버 빌드 (PyInstaller)
        run: |
          cd server
          pyinstaller app-mac.spec

      - name: whisper-cli 빌드 (whisper.cpp)
        run: |
          git clone https://github.com/ggerganov/whisper.cpp --depth 1
          cd whisper.cpp
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release --target whisper-cli
          mkdir -p ../server/dist/app/whisper-bin
          cp build/bin/whisper-cli ../server/dist/app/whisper-bin/whisper-cli
          chmod +x ../server/dist/app/whisper-bin/whisper-cli

      - name: ffmpeg 번들
        run: |
          brew install ffmpeg
          cp "$(which ffmpeg)" server/dist/app/ffmpeg
          chmod +x server/dist/app/ffmpeg

      - name: resources/server 준비
        run: |
          mkdir -p resources/server
          cp -r server/dist/app/* resources/server/

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: npm 의존성 설치
        run: npm install

      - name: Vite 프론트엔드 빌드
        run: npm run build

      - name: 앱 아이콘 512x512 리사이즈
        run: sips -z 512 512 src/assets/gongulbaki-logo.png

      - name: Electron DMG 빌드
        run: npx electron-builder --mac --arm64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: GitHub Release 생성
        run: |
          gh release delete mac-latest --yes 2>/dev/null || true
          gh release create mac-latest release/*.dmg \
            --title "곤글박이 Mac 버전" \
            --notes "## 곤글박이 Mac 버전

          상담 축어록 변환 앱 곤글박이의 Mac 버전입니다.

          ### 설치 방법
          1. DMG 파일 다운로드
          2. 열기 후 앱을 Applications 폴더로 드래그
          3. **처음 실행 시 더블클릭 말고 우클릭 → 열기** 로 실행

          ### 참고
          - Apple Silicon(M1/M2/M3/M4) Mac 전용입니다
          - 음성 변환 기능은 처음 실행 시 모델을 다운로드합니다 (인터넷 연결 필요)
          - 문제 발생 시 홈 폴더의 gongulbaki_debug.txt 파일을 개발자에게 보내주세요" \
            --repo ${{ github.repository }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
