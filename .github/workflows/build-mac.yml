name: Build Mac DMG

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r server/requirements-mac.txt

      - name: Build Python server (PyInstaller)
        run: |
          cd server
          pyinstaller app-mac.spec --noconfirm
          mkdir -p ../resources/server
          cp -r dist/app/* ../resources/server/

      - name: Build whisper.cpp
        run: |
          git clone --depth 1 https://github.com/ggerganov/whisper.cpp whisper-src
          cd whisper-src
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release -j$(sysctl -n hw.ncpu)
          mkdir -p ../resources/server/whisper-bin
          cp build/bin/whisper-cli ../resources/server/whisper-bin/whisper-cli
          chmod +x ../resources/server/whisper-bin/whisper-cli

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install npm dependencies
        run: npm install

      - name: Vite build
        run: npm run build

      - name: Resize icon to 512x512 (macOS requirement)
        run: sips -z 512 512 src/assets/gongulbaki-logo.png

      - name: Build DMG
        run: npm run dist

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: gongulbaki-mac-dmg
          path: release/*.dmg
          retention-days: 7
